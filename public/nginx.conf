# Nginx configuration for SPA (Single Page Application)
# Copy these settings to your nginx server block configuration
# Usually located at: /etc/nginx/sites-available/your-site or /etc/nginx/conf.d/your-site.conf

server {
    listen 80;
    server_name your-domain.com;  # Change to your domain
    root /var/www/html;           # Change to your dist folder path
    index index.html;

    # Gzip compression for better performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # Handle SPA routing - THIS IS THE KEY FIX FOR 404 ON REFRESH
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
