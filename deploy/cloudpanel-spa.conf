# CloudPanel (VPS) – SPA fallback: fix 404 on refresh for /about-us, /product/123, etc.
#
# 1. In CloudPanel: Sites → your site → Vhost
# 2. Find the "location /" block in the Nginx config.
# 3. Inside "location / { ... }", add this line (or ensure it’s there):
#
#    try_files $uri $uri/ /index.html;
#
# 4. If "location /" has try_files already (e.g. for PHP), replace it with the line above.
# 5. Save. CloudPanel will check the config and reload Nginx.
#
# Your document root (e.g. .../htdocs/yourdomain.com/public) should contain the
# contents of dist/: index.html, assets/, .htaccess, etc.

location / {
  try_files $uri $uri/ /index.html;
}
